version: '3.8'

services:
  backend_app:
    build: ./backend
    container_name: target_flask
    expose:
      - "8080"
    restart: always

  web_server:
    image: nginx:latest
    container_name: target_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend_app
    restart: always